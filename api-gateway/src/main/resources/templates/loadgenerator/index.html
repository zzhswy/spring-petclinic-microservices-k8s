<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'load-generator')}">
<body>

<h2>Synthetic Load Generator</h2>

<div th:if="${running}" class="alert alert-success">
    Load Generator is currently <strong>RUNNING</strong>.
</div>
<div th:if="${!running}" class="alert alert-secondary">
    Load Generator is currently <strong>STOPPED</strong>.
</div>

<form th:if="${!running}" th:action="@{/load-generator/start}" method="post" class="form-horizontal">
    <div class="form-group has-feedback mb-3">
        <label class="col-sm-2 control-label">Target URL</label>
        <div class="col-sm-10">
            <input type="url" name="targetUrl" value="http://petclinic:80" class="form-control" required="required" />
            <span class="help-inline text-muted">The base URL of the Petclinic deployment.</span>
        </div>
    </div>
    <div class="form-group has-feedback mb-3">
        <label class="col-sm-2 control-label">Request Delay (ms)</label>
        <div class="col-sm-10">
            <input type="number" name="delayMs" value="1000" class="form-control" required="required" min="10" />
        </div>
    </div>
    <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
            <button class="btn btn-primary" type="submit">Start Load</button>
        </div>
    </div>
</form>

<form th:if="${running}" th:action="@{/load-generator/stop}" method="post">
    <button class="btn btn-danger" type="submit">Stop Load</button>
</form>

</body>
</html>
