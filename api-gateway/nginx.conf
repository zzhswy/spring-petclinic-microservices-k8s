events { worker_connections 1024; }
http {
    include mime.types;
    server {
        listen 8080;
        
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        location /resources/ {
            alias /usr/share/nginx/html/resources/;
        }
        
        # Go Headless Chromium Dashboard Route
        location /synthetic/ {
            proxy_pass http://synthetic-client:8090/;
        }
        location /api/config {
            proxy_pass http://synthetic-client:8090/api/config;
        }
        
        # Visits match must come BEFORE owners due to regex priority logic
        location ~ ^/owners/.*/pets/.*/visits/ {
            proxy_pass http://visits-service:8083;
        }
        
        location /owners/ {
            proxy_pass http://customers-service:8081;
        }
        location /owners {
            proxy_pass http://customers-service:8081;
        }
        location /pets/ {
            proxy_pass http://customers-service:8081;
        }
        location /vets {
            proxy_pass http://vets-service:8082;
        }
        location / {
            proxy_pass http://customers-service:8081;
        }
    }
}
